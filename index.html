<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ザリガニゲームス</title>
        <meta property="og:title" content="ザリガニゲームス" />
        <meta property="og:description" content="CoderDojo神山で制作されたブラウザゲーム集" />
        <meta property="og:image" content="./resource/ogp.png" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="ザリガニゲームス" />
        <meta name="twitter:description" content="CoderDojo神山で制作されたブラウザゲーム集" />
        <meta name="twitter:image" content="./resource/ogp.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-deep: #0a0e1a;
                --bg-water: #0d1929;
                --accent-cyan: #00f5d4;
                --accent-pink: #ff6b9d;
                --accent-yellow: #ffd93d;
                --accent-orange: #ff8c42;
                --card-bg: rgba(20, 35, 60, 0.85);
                --card-border: rgba(0, 245, 212, 0.2);
                --text-primary: #ffffff;
                --text-secondary: rgba(255, 255, 255, 0.7);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Zen Maru Gothic", sans-serif;
                min-height: 100vh;
                background: var(--bg-deep);
                color: var(--text-primary);
                overflow-x: hidden;
                position: relative;
            }

            /* Animated water background */
            .bg-layer {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                overflow: hidden;
            }

            .bg-gradient {
                position: absolute;
                width: 100%;
                height: 100%;
                background: radial-gradient(ellipse at 20% 20%, rgba(0, 245, 212, 0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(255, 107, 157, 0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 50% 50%, rgba(255, 140, 66, 0.05) 0%, transparent 60%),
                    linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-water) 50%, #0f2035 100%);
            }

            /* Floating bubbles */
            .bubble {
                position: absolute;
                border-radius: 50%;
                background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), rgba(0, 245, 212, 0.1));
                animation: float-up linear infinite;
                opacity: 0;
            }

            @keyframes float-up {
                0% {
                    transform: translateY(100vh) scale(0);
                    opacity: 0;
                }
                10% {
                    opacity: 0.6;
                }
                90% {
                    opacity: 0.6;
                }
                100% {
                    transform: translateY(-100px) scale(1);
                    opacity: 0;
                }
            }

            /* Wavy lines */
            .wave-container {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 200px;
                overflow: hidden;
                opacity: 0.1;
            }

            .wave {
                position: absolute;
                bottom: 0;
                left: -50%;
                width: 200%;
                height: 100px;
                background: repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    var(--accent-cyan) 50px,
                    var(--accent-cyan) 51px
                );
                animation: wave-move 20s linear infinite;
            }

            .wave:nth-child(2) {
                bottom: 30px;
                opacity: 0.5;
                animation-duration: 25s;
                animation-direction: reverse;
            }

            @keyframes wave-move {
                0% {
                    transform: translateX(0);
                }
                100% {
                    transform: translateX(50%);
                }
            }

            /* Arcade cabinet frame */
            .cabinet {
                max-width: 1240px;
                margin: 30px auto;
                padding: 0;
                position: relative;
                z-index: 1;
                background: linear-gradient(180deg, #1a1030 0%, #0c0820 100%);
                border: 4px solid #2a1a4a;
                border-radius: 30px;
                box-shadow:
                    0 0 0 2px rgba(0, 245, 212, 0.25),
                    0 0 60px rgba(0, 245, 212, 0.15),
                    0 0 120px rgba(255, 107, 157, 0.1),
                    inset 0 0 60px rgba(0, 0, 0, 0.6);
            }

            .cabinet-marquee {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 18px;
                padding: 14px 30px;
                background: linear-gradient(180deg, #0d1929 0%, #1a2540 100%);
                border-bottom: 2px solid var(--accent-cyan);
                border-radius: 26px 26px 0 0;
                box-shadow:
                    inset 0 -8px 20px rgba(0, 245, 212, 0.18),
                    inset 0 4px 12px rgba(255, 107, 157, 0.1);
                overflow: hidden;
            }

            .cabinet-marquee::before,
            .cabinet-marquee::after {
                content: "";
                flex: 0 0 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--accent-pink);
                box-shadow: 0 0 10px var(--accent-pink), 0 0 20px var(--accent-pink);
                animation: marquee-blink 1.4s ease-in-out infinite;
            }

            .cabinet-marquee::after {
                background: var(--accent-yellow);
                box-shadow: 0 0 10px var(--accent-yellow), 0 0 20px var(--accent-yellow);
                animation-delay: 0.7s;
            }

            @keyframes marquee-blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.3; }
            }

            .marquee-text {
                font-family: "Dela Gothic One", sans-serif;
                font-size: clamp(0.9rem, 2.4vw, 1.4rem);
                letter-spacing: 0.3em;
                background: linear-gradient(90deg, var(--accent-cyan), var(--accent-yellow), var(--accent-pink));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                filter: drop-shadow(0 0 8px rgba(0, 245, 212, 0.6));
            }

            /* CRT screen area */
            .cabinet-screen {
                position: relative;
                padding: 40px 30px;
                background:
                    radial-gradient(ellipse at center, rgba(13, 25, 41, 0.6) 0%, rgba(10, 14, 26, 0.85) 100%);
                overflow: hidden;
            }

            .cabinet-screen::before {
                content: "";
                position: absolute;
                inset: 0;
                background-image: repeating-linear-gradient(
                    0deg,
                    transparent 0px,
                    transparent 2px,
                    rgba(0, 0, 0, 0.18) 2px,
                    rgba(0, 0, 0, 0.18) 3px
                );
                pointer-events: none;
                z-index: 2;
                mix-blend-mode: multiply;
            }

            .cabinet-screen::after {
                content: "";
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.45) 100%);
                pointer-events: none;
                z-index: 2;
            }

            /* Cabinet control panel */
            .cabinet-controls {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 20px;
                padding: 18px 30px 22px;
                background: linear-gradient(180deg, #1a2540 0%, #0d1929 100%);
                border-top: 2px solid rgba(0, 245, 212, 0.4);
                border-radius: 0 0 26px 26px;
                flex-wrap: wrap;
            }

            .joystick {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: radial-gradient(circle at 35% 35%, #ff8fb5, var(--accent-pink) 60%, #b03a6c);
                box-shadow:
                    0 4px 0 #4a1530,
                    0 0 12px rgba(255, 107, 157, 0.5),
                    inset 0 -3px 6px rgba(0, 0, 0, 0.4);
                position: relative;
            }

            .joystick::before {
                content: "";
                position: absolute;
                left: 50%;
                top: 100%;
                transform: translateX(-50%);
                width: 8px;
                height: 14px;
                background: #2a1a4a;
                border-radius: 0 0 4px 4px;
            }

            .arcade-btn {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                box-shadow:
                    0 4px 0 rgba(0, 0, 0, 0.5),
                    inset 0 -4px 6px rgba(0, 0, 0, 0.3),
                    inset 0 3px 5px rgba(255, 255, 255, 0.4);
            }

            .arcade-btn.red {
                background: radial-gradient(circle at 35% 35%, #ff7b7b, #e23636);
            }
            .arcade-btn.yellow {
                background: radial-gradient(circle at 35% 35%, #ffe680, var(--accent-yellow));
            }
            .arcade-btn.green {
                background: radial-gradient(circle at 35% 35%, #7af5b8, #2dc878);
            }
            .arcade-btn.blue {
                background: radial-gradient(circle at 35% 35%, #82e6f5, #2bb1c9);
            }

            .coin-slot {
                font-family: "Dela Gothic One", sans-serif;
                font-size: 0.7rem;
                letter-spacing: 0.2em;
                color: var(--accent-yellow);
                padding: 8px 14px;
                background: #0a0e1a;
                border: 2px solid #3a2a1a;
                border-radius: 4px;
                box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.8);
                position: relative;
            }

            .coin-slot::before {
                content: "";
                position: absolute;
                left: 50%;
                top: -5px;
                transform: translateX(-50%);
                width: 22px;
                height: 4px;
                background: #000;
                border-radius: 2px;
                box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1);
            }

            /* Main content */
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0;
                position: relative;
                z-index: 3;
            }

            /* Header */
            header {
                text-align: center;
                margin-bottom: 50px;
                animation: fade-in-down 0.8s ease-out;
            }

            @keyframes fade-in-down {
                from {
                    opacity: 0;
                    transform: translateY(-30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .logo {
                display: inline-block;
                position: relative;
            }

            .logo-icon {
                font-size: 4rem;
                display: block;
                margin-bottom: 10px;
                animation: wiggle 3s ease-in-out infinite;
                filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.5));
            }

            @keyframes wiggle {
                0%,
                100% {
                    transform: rotate(-5deg);
                }
                50% {
                    transform: rotate(5deg);
                }
            }

            h1 {
                font-family: "Dela Gothic One", sans-serif;
                font-size: clamp(2rem, 8vw, 3.5rem);
                background: linear-gradient(
                    135deg,
                    var(--accent-cyan) 0%,
                    var(--accent-pink) 50%,
                    var(--accent-yellow) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: 0.05em;
                text-shadow: none;
                position: relative;
            }

            h1::after {
                content: "ザリガニゲームス";
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: linear-gradient(
                    135deg,
                    var(--accent-cyan) 0%,
                    var(--accent-pink) 50%,
                    var(--accent-yellow) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                filter: blur(20px);
                opacity: 0.5;
                z-index: -1;
            }

            .subtitle {
                margin-top: 15px;
                font-size: 1rem;
                color: var(--text-secondary);
                letter-spacing: 0.2em;
            }

            .subtitle span {
                color: var(--accent-cyan);
                font-weight: 700;
            }

            /* Game grid */
            .game-list {
                display: grid;
                gap: 25px;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }

            .game-card {
                position: relative;
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 20px;
                padding: 30px 25px;
                text-decoration: none;
                color: inherit;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                overflow: hidden;
                opacity: 0;
                transform: translateY(40px);
                animation: card-enter 0.6s ease-out forwards;
                backdrop-filter: blur(10px);
            }

            .game-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink), var(--accent-yellow));
                opacity: 0;
                transition: opacity 0.3s;
            }

            .game-card::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: radial-gradient(
                    circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(0, 245, 212, 0.1) 0%,
                    transparent 50%
                );
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.3s;
            }

            .game-card:hover::before,
            .game-card:hover::after {
                opacity: 1;
            }

            .game-card:hover {
                transform: translateY(-8px) scale(1.02);
                border-color: rgba(0, 245, 212, 0.4);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(0, 245, 212, 0.15),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }

            @keyframes card-enter {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .game-icon {
                font-size: 3.5rem;
                text-align: center;
                margin-bottom: 20px;
                transition: transform 0.3s ease;
                filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            }

            .game-card:hover .game-icon {
                transform: scale(1.15) rotate(-5deg);
            }

            .game-icon img {
                width: 70px;
                height: 70px;
                object-fit: cover;
                border-radius: 12px;
                border: 2px solid var(--card-border);
            }

            .game-title {
                font-family: "Dela Gothic One", sans-serif;
                font-size: 1.3rem;
                color: var(--text-primary);
                margin: 0;
                text-align: center;
                line-height: 1.4;
            }

            .game-description {
                font-size: 0.9rem;
                color: var(--text-secondary);
                margin: 12px 0 0 0;
                text-align: center;
                line-height: 1.5;
            }

            .game-platforms {
                position: absolute;
                top: 12px;
                right: 12px;
                display: flex;
                gap: 4px;
                font-size: 1rem;
                opacity: 0.7;
                transition: opacity 0.3s;
            }

            .game-card:hover .game-platforms {
                opacity: 1;
            }

            .platform-icon {
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 6px;
                font-size: 0.85rem;
            }

            .play-hint {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                margin-top: 20px;
                font-size: 0.85rem;
                color: var(--accent-cyan);
                opacity: 0;
                transform: translateY(10px);
                transition: all 0.3s ease;
            }

            .play-hint svg {
                width: 16px;
                height: 16px;
                transition: transform 0.3s ease;
            }

            .game-card:hover .play-hint {
                opacity: 1;
                transform: translateY(0);
            }

            .game-card:hover .play-hint svg {
                transform: translateX(4px);
            }

            /* Loading state */
            .loading {
                text-align: center;
                color: var(--text-secondary);
                font-size: 1.2rem;
                padding: 60px 20px;
            }

            .loading::after {
                content: "";
                display: inline-block;
                width: 20px;
                height: 20px;
                border: 2px solid var(--accent-cyan);
                border-top-color: transparent;
                border-radius: 50%;
                margin-left: 10px;
                animation: spin 1s linear infinite;
                vertical-align: middle;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* Footer */
            footer {
                text-align: center;
                margin-top: 60px;
                padding-top: 30px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                animation: fade-in-up 0.8s ease-out 0.5s both;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            @keyframes fade-in-up {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .footer-logo {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                color: var(--text-secondary);
                font-size: 0.9rem;
                text-decoration: none;
                transition: all 0.3s;
            }

            .footer-logo:hover {
                color: var(--accent-cyan);
            }

            .footer-logo.primary {
                font-family: "Dela Gothic One", sans-serif;
                font-size: 1.1rem;
                color: var(--accent-cyan);
                padding: 10px 24px;
                border: 1px solid var(--accent-cyan);
                border-radius: 30px;
                background: rgba(0, 245, 212, 0.05);
            }

            .footer-logo.primary:hover {
                background: rgba(0, 245, 212, 0.15);
                box-shadow: 0 0 20px rgba(0, 245, 212, 0.3);
                transform: translateY(-2px);
            }

            .footer-logo img {
                height: 24px;
                opacity: 0.7;
                transition: opacity 0.3s;
            }

            .footer-logo:hover img {
                opacity: 1;
            }

            /* Responsive */
            @media (max-width: 600px) {
                .cabinet {
                    margin: 12px 8px;
                    border-width: 3px;
                    border-radius: 20px;
                }

                .cabinet-marquee {
                    padding: 10px 16px;
                    border-radius: 16px 16px 0 0;
                    gap: 10px;
                }

                .cabinet-screen {
                    padding: 25px 12px;
                }

                .cabinet-controls {
                    gap: 12px;
                    padding: 12px 16px 16px;
                    border-radius: 0 0 16px 16px;
                }

                .joystick {
                    width: 28px;
                    height: 28px;
                }

                .arcade-btn {
                    width: 24px;
                    height: 24px;
                }

                .coin-slot {
                    font-size: 0.6rem;
                    padding: 6px 10px;
                }

                .container {
                    padding: 0;
                }

                header {
                    margin-bottom: 35px;
                }

                .logo-icon {
                    font-size: 3rem;
                }

                .game-list {
                    gap: 18px;
                }

                .game-card {
                    padding: 25px 20px;
                }

                .game-icon {
                    font-size: 2.8rem;
                    margin-bottom: 15px;
                }

                .game-title {
                    font-size: 1.1rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="bg-layer">
            <div class="bg-gradient"></div>
            <div class="wave-container">
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
        </div>

        <div class="cabinet">
            <div class="cabinet-marquee">
                <span class="marquee-text">ZARIGANI ARCADE</span>
            </div>

            <div class="cabinet-screen">
                <div class="container">
                    <header>
                        <div class="logo">
                            <span class="logo-icon">🦞</span>
                            <h1>ザリガニゲームス</h1>
                        </div>
                        <p class="subtitle">made with <span>CoderDojo神山</span></p>
                    </header>

                    <div id="gameList" class="loading">ゲームを読み込み中</div>

                    <footer>
                        <a href="https://coderdojo.kamiyama.club/" target="_blank" rel="noopener" class="footer-logo primary">
                            <span>CoderDojo神山</span>
                        </a>
                        <a href="https://coderdojo.jp/" target="_blank" rel="noopener" class="footer-logo">
                            <span>Powered by CoderDojo Japan</span>
                        </a>
                    </footer>
                </div>
            </div>

            <div class="cabinet-controls">
                <div class="joystick"></div>
                <div class="arcade-btn red"></div>
                <div class="arcade-btn yellow"></div>
                <div class="arcade-btn green"></div>
                <div class="arcade-btn blue"></div>
                <div class="coin-slot">INSERT COIN</div>
            </div>
        </div>

        <script>
            // Create floating bubbles
            function createBubbles() {
                const bgLayer = document.querySelector(".bg-layer");
                const bubbleCount = 15;

                for (let i = 0; i < bubbleCount; i++) {
                    const bubble = document.createElement("div");
                    bubble.className = "bubble";
                    const size = Math.random() * 20 + 5;
                    bubble.style.width = size + "px";
                    bubble.style.height = size + "px";
                    bubble.style.left = Math.random() * 100 + "%";
                    bubble.style.animationDuration = Math.random() * 10 + 10 + "s";
                    bubble.style.animationDelay = Math.random() * 10 + "s";
                    bgLayer.appendChild(bubble);
                }
            }

            // Card mouse tracking for glow effect
            function initCardEffects() {
                document.querySelectorAll(".game-card").forEach((card) => {
                    card.addEventListener("mousemove", (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = ((e.clientX - rect.left) / rect.width) * 100;
                        const y = ((e.clientY - rect.top) / rect.height) * 100;
                        card.style.setProperty("--mouse-x", x + "%");
                        card.style.setProperty("--mouse-y", y + "%");
                    });
                });
            }

            async function loadGames() {
                try {
                    const response = await fetch("./links.json");
                    const games = await response.json();

                    const gameListElement = document.getElementById("gameList");
                    gameListElement.innerHTML = "";
                    gameListElement.className = "game-list";

                    games.forEach((game, index) => {
                        const gameCard = document.createElement("a");
                        gameCard.href = game.path;
                        gameCard.className = "game-card";
                        gameCard.style.animationDelay = index * 0.08 + "s";

                        // Platforms
                        if (game.platforms && game.platforms.length > 0) {
                            const platforms = document.createElement("div");
                            platforms.className = "game-platforms";
                            game.platforms.forEach((platform) => {
                                const icon = document.createElement("span");
                                icon.className = "platform-icon";
                                icon.textContent = platform;
                                platforms.appendChild(icon);
                            });
                            gameCard.appendChild(platforms);
                        }

                        if (game.icon) {
                            const gameIcon = document.createElement("div");
                            gameIcon.className = "game-icon";

                            if (
                                game.icon.startsWith("http") ||
                                game.icon.startsWith("./") ||
                                game.icon.startsWith("../")
                            ) {
                                const iconImg = document.createElement("img");
                                iconImg.src = game.icon;
                                iconImg.alt = game.title + " icon";
                                iconImg.loading = "lazy";
                                gameIcon.appendChild(iconImg);
                            } else {
                                gameIcon.textContent = game.icon;
                            }

                            gameCard.appendChild(gameIcon);
                        }

                        const gameTitle = document.createElement("h2");
                        gameTitle.className = "game-title";
                        gameTitle.textContent = game.title;
                        gameCard.appendChild(gameTitle);

                        if (game.description) {
                            const gameDescription = document.createElement("p");
                            gameDescription.className = "game-description";
                            gameDescription.textContent = game.description;
                            gameCard.appendChild(gameDescription);
                        }

                        // Play hint
                        const playHint = document.createElement("div");
                        playHint.className = "play-hint";
                        playHint.innerHTML = `
                            <span>あそぶ</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        `;
                        gameCard.appendChild(playHint);

                        gameListElement.appendChild(gameCard);
                    });

                    // Initialize card effects after cards are loaded
                    initCardEffects();
                } catch (error) {
                    console.error("ゲームの読み込みに失敗しました:", error);
                    document.getElementById("gameList").innerHTML =
                        '<p style="text-align: center; color: var(--accent-pink);">ゲームの読み込みに失敗しました</p>';
                }
            }

            document.addEventListener("DOMContentLoaded", () => {
                createBubbles();
                loadGames();
            });
        </script>
    </body>
</html>
