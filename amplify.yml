version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Playwright Python パッケージのみ。Chromium と必要な依存ライブラリは
        # カスタムビルドイメージ (mcr.microsoft.com/playwright/python:*-noble) に
        # 同梱済みなのでここでのインストール不要。
        - pip3 install --quiet playwright
    build:
      commands:
        - python3 scripts/build.py --screenshots
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []
